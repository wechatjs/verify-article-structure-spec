name: 规则反馈
description: 报告规则误报、漏报，或建议新增/调整规则
title: "[规则反馈] "
labels: ["triage"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ **提交前请确认**：此 Issue 会被 AI Agent 自动处理并尝试修改代码。请尽可能详细填写，帮助 Agent 精准定位问题。

  - type: dropdown
    id: feedback_type
    attributes:
      label: 反馈类型
      description: 你遇到的是什么类型的问题？
      options:
        - "🐛 误报 (False Positive) — 合规文章被误判为违规"
        - "🐛 漏报 (False Negative) — 明显有问题的文章未被检测"
        - "💡 新增规则 — 建议增加一条新的检测规则"
        - "⚙️ 阈值调整 — 某条规则的参数太严或太松"
    validations:
      required: true

  - type: input
    id: rule_name
    attributes:
      label: 涉及规则
      description: 指明是哪条规则，例如 `2.4 width`、`2.1 opacity`、`3.1 嵌套层级`、`5.1 颜色` 等。如不确定，写"不确定"。
      placeholder: "例如：2.4 width"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### 📄 文章提供方式 ⚠️ 三选一，其他留空

        请只选择以下**一种**方式提供触发问题的文章：

        - **🔗 方式一（推荐）**：填写下方「文章链接」字段，AI Agent 会自动抓 HTML
        - **📋 方式二**：在下方「文章 HTML」字段直接粘贴 HTML 代码
        - **📁 方式三 — 上传 HTML 文件**：上方两个字段都留空，提交 Issue 后到评论区拖拽上传 `.html` 文件

        ⚠️ **三种方式互斥**，请仅选择其一填写：选「上传 HTML 文件」时，上方两个字段请留空；选「文章链接」时，请勿在「方式二」粘贴 HTML。

  - type: input
    id: article_url
    attributes:
      label: "🔗 方式一：文章链接（推荐）"
      description: 提供触发问题的公众号文章链接。AI Agent 会自动抓取完整 HTML。⚠️ 仅在选了「方式一」时填写，其他方式此字段留空。
      placeholder: "https://mp.weixin.qq.com/s/xxx"
    validations:
      required: false

  - type: textarea
    id: html_snippet
    attributes:
      label: "📋 方式二：粘贴 HTML 代码（≤ 64KB）"
      description: |
        直接粘贴文章 HTML 代码。⚠️ **仅在选了「方式二」时填写**，其他方式此字段留空。
        本字段最多 65536 字符，超过会被截断。建议只粘贴 `<div id="js_content">` 内的关键片段。
      placeholder: |
        ```html
        <div id="js_content">
          <!-- 粘贴关键 HTML -->
        </div>
        ```
      render: html
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ### 🔍 问题描述

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰说明你遇到的问题：期望行为 vs 实际行为
      placeholder: |
        例如：
        - 期望：这篇文章不应该触发「width 超出边界」的提示
        - 实际：文章被标记为 width 违规
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 期望行为
      description: 你认为正确的检测结果应该是什么？
      placeholder: "例如：这篇文章应该被判定为合规，或应该被标记为 xxx 规则违规"
    validations:
      required: true

  - type: textarea
    id: detection_idea
    attributes:
      label: 检测思路（可选）
      description: 如果你对如何自动检测该问题有思路，欢迎提出
      placeholder: "例如：可以检查图片的 opacity 样式是否为 0..."
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交前确认
      options:
        - label: 我已阅读规范文档，确认此问题未被现有规则覆盖
          required: true
        - label: 如提供了文章链接，我确认该链接可公开访问（无需登录）
          required: false
        - label: 我已确认「文章提供方式」三选一，未填写的内容已留空
          required: true
        - label: 我理解此 Issue 将由 AI Agent 自动处理，处理结果会在此 Issue 中反馈
          required: true
