<section style="text-align: center;margin-bottom: 32px;line-height: 1.75em;"><span leaf=""><img data-src="https://mmbiz.qpic.cn/mmbiz_gif/XTEsK8xsZk0401ibvgEMyNBicZcOoLBjKnNpMr4loic2lL6Ilyg6aGzyzoTGcs87waW1ATkOP5SjOrVdWm4GiamoqQ/640?wx_fmt=gif" class="rich_pages wxw-img" data-ratio="0.18518518518518517" data-type="gif" data-w="1080" data-aistatus="1"  /></span></section><p data-pm-slice="0 0 []" style="margin-bottom: 32px;line-height: 1.75em;"><span leaf=""><span textstyle="" style="letter-spacing: 0.5px;color: rgb(0, 122, 170);font-weight: bold;">截至发稿，</span></span><span leaf=""><span textstyle="" style="letter-spacing: 0.5px;color: rgb(0, 122, 170);font-weight: bold;">国际原油期货跌幅扩大，WTI原油期货价格跌5.04%</span><span textstyle="" style="letter-spacing: 0.5px;">，报83.288美元/桶；布伦特原油期货价格跌4.97%，报85.886美元/桶。</span></span></p><p data-pm-slice="0 0 []" style="margin-bottom: 32px;line-height: 1.75em;"><span leaf=""><span textstyle="" style="letter-spacing: 0.5px;color: rgb(0, 122, 170);font-weight: bold;">消息面上，伊朗与美国的14点谅解备忘录草案新细节已公布</span><span textstyle="" style="letter-spacing: 0.5px;">，包括美国承诺解除制裁、从伊朗周边撤军、解除海上封锁、开放霍尔木兹海峡、取消石油制裁、解冻伊朗被冻结的资产等。</span></span></p><p data-pm-slice="0 0 []" style="margin-bottom: 32px;line-height: 1.75em;"><span leaf=""><span textstyle="" style="letter-spacing: 0.5px;">报道还说，美国有义务提供伊朗经济重建计划，“两国间的最终谈判应聚焦核问题和经济问题，但不会涉及伊朗的导弹计划”。</span></span></p><section class="mp_profile_iframe_wrp" style="margin-bottom: 16px;"><span leaf=""><mp-common-profile class="js_uneditable custom_select_card mp_profile_iframe" data-pluginname="mpprofile" data-nickname="财联社" data-alias="cailianpress" data-from="0" data-headimg="http://mmbiz.qpic.cn/mmbiz_png/XTEsK8xsZk2c1ROIuwnqDkcuClthb1M3icJyj1sUluiaHMvG8DqQUNIic0vQPGNlic4Yu5AU5g4p9sSiaIMicOLKrDAA/0?wx_fmt=png" data-signature="财联社是上海报业集团主管主办，定位资本市场报道财经通讯社，以“准确、快速、权威、专业”为准则，提供7x24小时金融信息服务。" data-id="Mzg5MzEyNzEwNQ==" data-is_biz_ban="0"></mp-common-profile></span></section><section style="letter-spacing: 0.578px;text-wrap: wrap;margin-b
